name: Release - Build Native Installers

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-installers:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest] # Note: Add macos-latest later if needed!

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install WiX Toolset (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          choco install wixtoolset --yes

      - name: Build Executable Fat JAR
        run: mvn clean package -DskipTests

      - name: Prepare jpackage input
        shell: bash
        run: |
          mkdir -p jpackage-input
          cp target/rpgadminmenu-1.0-SNAPSHOT.jar jpackage-input/

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package Installer (Windows MSI)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name "RPG Admin Menu" `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --vendor "Minden" `
            --input jpackage-input/ `
            --main-jar rpgadminmenu-1.0-SNAPSHOT.jar `
            --icon packaging/icon.ico `
            --dest dist/ `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Package Installer (Linux DEB)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --type deb \
            --name "rpg-admin-menu" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Minden" \
            --input jpackage-input/ \
            --main-jar rpgadminmenu-1.0-SNAPSHOT.jar \
            --dest dist/ \
            --linux-shortcut

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/
          retention-days: 1

  publish-release:
    needs: build-installers
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPG Admin Menu Release ${{ github.ref_name }}"
          body: |
            ## Release Changes for ${{ github.ref_name }}
            Official production deployment files for the RPG Admin Menu.
            
            ## Download Installers:
            | Operating System | Installer File |
            |---|---|
            | Windows 10 / 11 | `*.msi` |
            | Ubuntu / Debian | `*.deb` |
          files: installers/**
          draft: false
          prerelease: false
